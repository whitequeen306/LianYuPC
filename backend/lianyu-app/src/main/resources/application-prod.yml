# 生产环境：关闭 API 文档 UI，避免暴露接口面
knife4j:
  enable: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

lianyu:
  api-docs:
    enabled: false

# WebSocket 仅允许 CORS 白名单来源连接（防 CSWSH）
ws:
  allowed-origin-patterns: ${CORS_ALLOWED_ORIGINS:https://localhost}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://localhost}
